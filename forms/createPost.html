<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <title>Create Post Form</title>
  </head>
  <body>
    <h1>Create Your Post</h1>
    <form action="" method="POST">
      <div class="label-input">
        <label for="title">Enter title of the post: </label>
        <input type="text" id="title" name="title" required />
      </div>
      <div class="label-input">
        <label for="body">Enter body of the post: </label>
        <textarea type="body" id="body" name="body" required> </textarea>
      </div>

      <button type="submit">Add Blog</button>
    </form>

    <script>
      const form = document.querySelector("form");

      const addNewPost = async (e) => {
        try {
          e.preventDefault();
          const title = document.querySelector("#title").value.trim();
          const body = document.querySelector("#body").value.trim();
          const token = localStorage.getItem("token");

          const newPost = { title, body };

          const res = await axios.post(
            "http://localhost:5000/api/posts",
            newPost,
            {
              headers: {
                Authorization: `Bearer ${token}`,
              },
            },
          );

          console.log(res.data);
          window.location.href = "../dashboard.html";
        } catch (err) {
          console.error(err);
        }
      };

      form.addEventListener("submit", addNewPost);
    </script>
  </body>
</html>
